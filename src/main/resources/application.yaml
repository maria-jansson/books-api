spring:
  config:
    import: optional:file:./.env
  application:
    name: booksapi
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booksdb}
    username: ${DB_USERNAME:books_user}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
server:
  forward-headers-strategy: framework
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
